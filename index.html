<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DODO FLAP - Black Swan Market Chaos</title>
  <style>
    body { margin:0; background:#000; overflow:hidden; font-family: 'Courier New', monospace; color:#ff0000; text-align:center; }
    canvas { display:block; margin:0 auto; image-rendering: pixelated; }
    #score { position:absolute; top:20px; left:50%; transform:translateX(-50%); font-size:2.8rem; text-shadow:0 0 25px #ff0000; pointer-events:none; }
    #start { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:2.2rem; background:rgba(0,0,0,0.85); padding:30px 50px; border:6px solid #ff0000; cursor:pointer; line-height:1.4; text-align:center; }
  </style>
</head>
<body>
  <div id="score">0</div>
  <div id="start" onclick="startGame()">CLICK TO START<br><small>SPACE or CLICK to flap<br>Red = death • Green = safe • Survive the chart</small></div>
  <canvas id="game" width="800" height="500"></canvas>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const startScreen = document.getElementById('start');

    let dodoImg = new Image();
    dodoImg.src = 'https://i.imgur.com/ZolkD0O.jpg';

    let bird = { x: 150, y: 250, vy: 0, size: 72, rotation: 0 };
    let gravity = 0.45;
    let flapStrength = -10.5;
    let score = 0;
    let gameRunning = false;
    let pipes = [];
    let frame = 0;
    let gameSpeed = 2.6;

    function startGame() {
      startScreen.style.display = 'none';
      resetGame();
      gameRunning = true;
      requestAnimationFrame(gameLoop);
    }

    function resetGame() {
      bird.y = 250;
      bird.vy = 0;
      score = 0;
      pipes = [];
      frame = 0;
      scoreEl.textContent = '0';
    }

    function flap() {
      if (gameRunning) bird.vy = flapStrength;
    }

    document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); flap(); } });
    canvas.addEventListener('mousedown', flap);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); });

    function createPipe() {
      const gap = 210;                    // bigger safe zone
      const minHeight = 90;
      const maxHeight = canvas.height - gap - minHeight - 40;
      const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
      
      pipes.push({
        x: canvas.width + 80,               // more space between sets
        top: topHeight,
        bottom: canvas.height - (topHeight + gap),
        passed: false
      });
    }

    function drawCrudeCandle(x, y, height, isGreen) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(Math.sin(frame / 12) * 0.04);
      
      ctx.fillStyle = isGreen ? '#00ff55' : '#ff2222';
      ctx.fillRect(-16, isGreen ? -height : 0, 32, height);
      
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 9;
      ctx.strokeRect(-16, isGreen ? -height : 0, 32, height);
      
      ctx.fillStyle = '#111';
      ctx.fillRect(-5, isGreen ? -height - 30 : height + 10, 10, 35);
      
      ctx.restore();
    }

    function gameLoop() {
      if (!gameRunning) return;

      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // faint grid
      ctx.strokeStyle = 'rgba(255,30,30,0.12)';
      ctx.lineWidth = 2;
      for (let i = 50; i < canvas.width; i += 80) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
      }
      for (let i = 40; i < canvas.height; i += 65) {
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
      }

      // Bird physics
      bird.vy += gravity;
      bird.y += bird.vy;
      bird.rotation = Math.min(Math.max(bird.vy * 4, -30), 50);

      // Draw DODO
      ctx.save();
      ctx.translate(bird.x, bird.y);
      ctx.rotate(bird.rotation * Math.PI / 180);
      ctx.drawImage(dodoImg, -bird.size/2, -bird.size/2, bird.size, bird.size);
      ctx.restore();

      // Spawn pipes less frequently
      if (frame % 85 === 0) createPipe();

      for (let i = pipes.length - 1; i >= 0; i--) {
        let p = pipes[i];
        p.x -= gameSpeed;

        // Red top candle = deadly
        drawCrudeCandle(p.x, p.top / 2, p.top, false);
        
        // Green bottom candle = safe to pass
        drawCrudeCandle(p.x, canvas.height - p.bottom / 2, p.bottom, true);

        // Collision - only check the RED top candle
        const birdLeft = bird.x - bird.size/2 + 15;
        const birdRight = bird.x + bird.size/2 - 15;
        const birdTop = bird.y - bird.size/2 + 20;
        const birdBottom = bird.y + bird.size/2 - 20;

        if (
          birdRight > p.x - 12 && birdLeft < p.x + 38 &&
          birdTop < p.top + 20
        ) {
          gameRunning = false;
          startScreen.innerHTML = `BLACK SWAN EVENT<br>Score: ${score}<br><small>Red candle got you • Click to try again</small>`;
          startScreen.style.display = 'block';
        }

        if (p.x + 40 < bird.x && !p.passed) {
          p.passed = true;
          score++;
          scoreEl.textContent = score;
        }

        if (p.x < -80) pipes.splice(i, 1);
      }

      // Wall crashes
      if (bird.y > canvas.height - 60 || bird.y < 30) {
        gameRunning = false;
        startScreen.innerHTML = `YOU HIT THE CHART<br>Score: ${score}<br><small>Click to flap again</small>`;
        startScreen.style.display = 'block';
      }

      frame++;
      requestAnimationFrame(gameLoop);
    }

    dodoImg.onload = () => console.log('New DODO ready');
  </script>
</body>
</html>
