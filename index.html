<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DODO the Black Swan</title>
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      background: #0a0a0a;
      color: #ff0000;
      font-family: monospace;
      text-align: center;
      min-height: 100vh;
    }
    h1 { 
      font-size: 52px; 
      margin: 10px 0 5px; 
      text-shadow: 0 0 25px #ff0000; 
    }
    h2 { 
      font-size: 24px; 
      color: #ff6666; 
      margin-bottom: 30px; 
    }
    .egg-container {
      width: 280px;
      margin: 40px auto;
      position: relative;
    }
    .egg {
      width: 280px;
      height: 340px;
      background: #f0f0f0;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      border: 16px solid #111;
      position: relative;
      box-shadow: 0 0 60px #ff0000;
      animation: heavyShake 0.8s infinite alternate;
    }
    .egg::before {
      content: "🥚";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 140px;
      z-index: 2;
    }
    .crack {
      position: absolute;
      background: #111;
      height: 8px;
      box-shadow: 0 0 10px #ff0000;
      animation: crackAnim 2.2s infinite;
    }
    .crack1 { top: 25%; left: 15%; width: 70%; transform: rotate(35deg); }
    .crack2 { top: 48%; left: 10%; width: 75%; transform: rotate(-32deg); animation-delay: 0.6s; }
    .crack3 { top: 72%; left: 20%; width: 62%; transform: rotate(40deg); animation-delay: 1.2s; }

    @keyframes heavyShake {
      0% { transform: rotate(-8deg) scale(1.02); }
      100% { transform: rotate(8deg) scale(0.98); }
    }
    @keyframes crackAnim {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    #countdown {
      font-size: 38px;
      font-weight: bold;
      letter-spacing: 8px;
      color: #ff0000;
      text-shadow: 0 0 20px #ff0000;
      margin: 30px 0 40px;
    }
  </style>
</head>
<body>
  <h1>DODO</h1>
  <h2>THE BLACK SWAN</h2>
  
  <div class="egg-container">
    <div class="egg">
      <div class="crack crack1"></div>
      <div class="crack crack2"></div>
      <div class="crack crack3"></div>
    </div>
  </div>

  <h2>HATCHING IN</h2>
  <div id="countdown"></div>

  <p style="max-width:700px; margin:0 auto 30px;">
    Hatched on /biz/ July 31 2021<br>
    5 years later... the black swan returns to Solana.<br><br>
    Something’s coming.
  </p>

  <p style="font-size:15px;">
    <a href="https://x.com/BlackSwanDodo_" style="color:#ff6666;">@BlackSwanDodo_</a> • Not financial advice. Just chaos. 🦤
  </p>

  <script>
    function countdown() {
      const target = new Date("2026-07-31T00:00:00").getTime();
      const now = new Date().getTime();
      const distance = target - now;

      if (distance < 0) {
        document.getElementById("countdown").innerHTML = "THE BLACK SWAN HAS HATCHED 🦤";
        return;
      }

      const days = Math.floor(distance / (1000*60*60*24));
      const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
      const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
      const seconds = Math.floor((distance % (1000*60)) / 1000);

      document.getElementById("countdown").innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }
    setInterval(countdown, 1000);
    countdown();
  </script>
</body>
</html>
