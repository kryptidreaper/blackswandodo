<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DODO - The Black Swan</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #ff0000;
      font-family: 'Courier New', monospace;
      text-align: center;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 4rem;
      margin: 10px 0 5px 0;
      text-shadow: 0 0 20px #ff0000;
      letter-spacing: 8px;
    }

    .subtitle {
      font-size: 1.5rem;
      margin-bottom: 40px;
      opacity: 0.9;
    }

    .egg-container {
      position: relative;
      width: 420px;
      height: 520px;
      margin: 30px 0;
    }

    .egg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 380px;
      height: 480px;
      background: #f8f8f8;
      border: 18px solid #111;
      border-radius: 50% 50% 48% 48% / 58% 58% 45% 45%;
      box-shadow: 
        inset 0 0 60px rgba(0,0,0,0.3),
        0 0 40px rgba(255, 0, 0, 0.2);
      animation: subtleWobble 4s infinite ease-in-out;
    }

    .crack {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    .swan {
      position: absolute;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-8deg);
      width: 260px;
      filter: drop-shadow(0 10px 20px rgba(255,0,0,0.4));
      animation: hatch 8s infinite ease-in-out;
    }

    .swan-head {
      animation: headBob 2.5s infinite alternate ease-in-out;
    }

    @keyframes subtleWobble {
      0%, 100% { transform: translate(-50%, -50%) rotate(-2deg); }
      50% { transform: translate(-50%, -50%) rotate(2deg); }
    }

    @keyframes hatch {
      0%, 100% { transform: translate(-50%, -45%) rotate(-8deg); }
      50% { transform: translate(-50%, -55%) rotate(-5deg); }
    }

    @keyframes headBob {
      from { transform: rotate(-5deg); }
      to { transform: rotate(8deg); }
    }

    .timer {
      font-size: 3.2rem;
      font-weight: bold;
      letter-spacing: 12px;
      text-shadow: 0 0 30px #ff0000;
      margin: 20px 0;
    }

    .footer {
      margin-top: 40px;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .glow {
      text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="glow">DODO</h1>
    <div class="subtitle">THE BLACK SWAN</div>

    <div class="egg-container">
      <!-- Egg -->
      <div class="egg"></div>
      
      <!-- Hatching Black Swan (crude /biz/ style) -->
      <svg class="swan" width="260" height="320" viewBox="0 0 260 320" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Egg shell cracks (thick messy lines) -->
        <path d="M60 80 Q120 20 200 90" stroke="#111" stroke-width="22" stroke-linecap="round"/>
        <path d="M70 120 Q150 40 210 130" stroke="#111" stroke-width="18" stroke-linecap="round"/>
        <path d="M40 160 Q110 80 180 170" stroke="#111" stroke-width="16" stroke-linecap="round"/>
        
        <!-- Black Swan Body (crude and chunky) -->
        <ellipse cx="130" cy="210" rx="95" ry="75" fill="#1a1a1a" stroke="#111" stroke-width="14"/>
        
        <!-- Neck -->
        <path d="M130 170 Q145 90 170 65" fill="none" stroke="#1a1a1a" stroke-width="48" stroke-linecap="round"/>
        
        <!-- Head -->
        <g class="swan-head">
          <!-- Head shape -->
          <ellipse cx="185" cy="58" rx="38" ry="32" fill="#1a1a1a" stroke="#111" stroke-width="12"/>
          <!-- Red Beak -->
          <polygon points="210,55 255,68 210,78" fill="#ff0000" stroke="#111" stroke-width="10"/>
          <!-- Red eye glow -->
          <circle cx="175" cy="48" r="14" fill="#ff2222"/>
          <circle cx="178" cy="46" r="6" fill="#fff"/>
        </g>
        
        <!-- Wing scribble -->
        <path d="M70 200 Q40 170 55 230 Q80 250 95 215" fill="none" stroke="#111" stroke-width="18" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="timer" id="timer">115d 18h 3m 28s</div>
    
    <div class="footer">
      <p>Hatched on /biz/ July 31 2021</p>
      <p>5 years later... the black swan returns to Solana.</p>
      <p class="glow">Something’s coming.</p>
      <p style="margin-top: 40px; font-size: 1rem; opacity: 0.7;">
        @BlackSwanDodo • Not financial advice. Just chaos. 🦢
      </p>
    </div>
  </div>

  <script>
    // Simple countdown (edit the target date as needed)
    function startCountdown() {
      // Example: 115 days from now (you can change this)
      let target = new Date().getTime() + (115 * 24 * 60 * 60 * 1000) + (18 * 60 * 60 * 1000) + (3 * 60 * 1000) + (28 * 1000);

      setInterval(() => {
        let now = new Date().getTime();
        let distance = target - now;

        if (distance < 0) {
          document.getElementById("timer").innerHTML = "HATCHED";
          return;
        }

        let days = Math.floor(distance / (1000 * 60 * 60 * 24));
        let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        let seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("timer").innerHTML = 
          `${days}d ${hours.toString().padStart(2, '0')}h ${minutes.toString().padStart(2, '0')}m ${seconds.toString().padStart(2, '0')}s`;
      }, 1000);
    }

    window.onload = startCountdown;
  </script>
</body>
</html>
