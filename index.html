<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DODO the Black Swan</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #0a0a0a;
      color: #ff0000;
      font-family: monospace;
      text-align: center;
      line-height: 1.4;
    }
    h1 {
      font-size: 52px;
      margin: 15px 0 8px;
      text-shadow: 0 0 15px #ff0000;
    }
    h2 {
      font-size: 20px;
      color: #ff6666;
      margin-bottom: 30px;
    }
    .egg {
      width: 230px;
      height: 300px;
      margin: 40px auto;
      background: #f0f0f0;
      border: 16px solid #111;
      border-radius: 45% 55% 48% 52% / 58% 42% 55% 45%;
      position: relative;
      animation: slowVibrate 2.8s infinite alternate ease-in-out;
    }
    .crack {
      position: absolute;
      background: #111;
      height: 7px;
      border-radius: 3px;
    }
    /* Cracks starting from the top */
    .crack1 { top: 18%; left: 22%; width: 58%; transform: rotate(38deg); }
    .crack2 { top: 26%; left: 15%; width: 72%; transform: rotate(-27deg); animation-delay: 0.6s; }
    .crack3 { top: 37%; left: 28%; width: 48%; transform: rotate(45deg); animation-delay: 1.3s; }

    #countdown {
      font-size: 36px;
      font-weight: bold;
      letter-spacing: 6px;
      color: #ff0000;
      text-shadow: 0 0 12px #ff0000;
      margin: 30px 0 40px;
    }
    p { font-size: 15px; max-width: 620px; margin: 0 auto; }
  </style>
</head>
<body>
  <h1>DODO</h1>
  <h2>THE BLACK SWAN</h2>

  <div class="egg">
    <div class="crack crack1"></div>
    <div class="crack crack2"></div>
    <div class="crack crack3"></div>
  </div>

  <h2>HATCHING IN</h2>
  <div id="countdown"></div>

  <p>
    Hatched on /biz/ July 31 2021<br>
    5 years later... the black swan returns to Solana.<br><br>
    Something’s coming.
  </p>

  <p style="margin-top:50px; font-size:14px;">
    <a href="https://x.com/BlackSwanDodo_" style="color:#ff6666;">@BlackSwanDodo_</a> 
    • Not financial advice. Just chaos. 🦤
  </p>

  <script>
    function countdown() {
      const target = new Date("2026-07-31T00:00:00Z").getTime();
      const now = new Date().getTime();
      const distance = target - now;

      if (distance < 0) {
        document.getElementById("countdown").innerHTML = "DODO HAS HATCHED 🦤";
        return;
      }

      const days = Math.floor(distance / (1000*60*60*24));
      const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
      const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
      const seconds = Math.floor((distance % (1000*60)) / 1000);

      document.getElementById("countdown").innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }
    setInterval(countdown, 1000);
    countdown();
  </script>

  <style>
    @keyframes slowVibrate {
      0% { transform: rotate(-4deg) scale(1.02); }
      100% { transform: rotate(4deg) scale(0.98); }
    }
  </style>
</body>
</html>
