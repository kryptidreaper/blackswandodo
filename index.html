<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DODO - The Black Swan</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #ff0000;
      font-family: 'Courier New', monospace;
      text-align: center;
      overflow: hidden;
    }
    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    h1 {
      font-size: 5rem;
      margin: 10px 0 5px;
      text-shadow: 0 0 30px #ff0000;
      letter-spacing: 10px;
    }
    .subtitle { font-size: 1.8rem; margin-bottom: 30px; }
    
    .dodo-image {
      max-width: 420px;
      margin: 30px 0;
      filter: drop-shadow(0 0 40px rgba(255, 30, 30, 0.6));
      image-rendering: pixelated; /* keeps it crisp if it's a low-res meme */
    }
    
    .timer {
      font-size: 3.5rem;
      font-weight: bold;
      letter-spacing: 15px;
      text-shadow: 0 0 40px #ff0000;
      margin: 20px 0 40px;
    }
    .footer {
      max-width: 600px;
      line-height: 1.7;
      font-size: 1.2rem;
    }
    .glow { text-shadow: 0 0 20px #ff0000; }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="glow">DODO</h1>
    <div class="subtitle">THE BLACK SWAN</div>
    
    <!-- Replace this src with your actual DODO image URL or local file -->
    <img src="YOUR_DODO_IMAGE_HERE.jpg" alt="DODO The Black Swan" class="dodo-image">
    
    <div class="timer" id="timer">115d 18h 3m 28s</div>
    
    <div class="footer">
      <p>Hatched on /biz/ July 31 2021</p>
      <p>5 years later... the black swan returns to Solana.</p>
      <p class="glow">Something’s coming.</p>
      <p style="margin-top: 50px; opacity: 0.8;">
        @BlackSwanDodo • Not financial advice. Just chaos. 🦢
      </p>
    </div>
  </div>

  <script>
    function startCountdown() {
      // Change this date if you want a real future target
      let target = new Date().getTime() + (115 * 24 * 60 * 60 * 1000) + (18*60*60*1000) + (3*60*1000) + (28*1000);

      setInterval(() => {
        let distance = target - Date.now();
        if (distance < 0) {
          document.getElementById("timer").innerHTML = "IT'S HERE";
          return;
        }
        let d = Math.floor(distance / (1000*60*60*24));
        let h = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
        let m = Math.floor((distance % (1000*60*60)) / (1000*60));
        let s = Math.floor((distance % (1000*60)) / 1000);
        document.getElementById("timer").innerHTML = `${d}d ${h.toString().padStart(2,'0')}h ${m.toString().padStart(2,'0')}m ${s.toString().padStart(2,'0')}s`;
      }, 1000);
    }
    window.onload = startCountdown;
  </script>
</body>
</html>
