<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DODO the Black Swan</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #0a0a0a;
      color: #ff0000;
      font-family: monospace;
      text-align: center;
      line-height: 1.3;
    }
    h1 {
      font-size: 55px;
      margin: 15px 0 5px;
      text-shadow: 0 0 15px #ff0000;
      letter-spacing: 3px;
    }
    h2 {
      font-size: 19px;
      color: #ff6666;
      margin-bottom: 25px;
    }
    .egg {
      width: 240px;
      height: 310px;
      margin: 30px auto;
      background: #eeeeee;
      border: 18px solid #111;
      border-radius: 48% 52% 45% 55% / 55% 45% 60% 40%;
      position: relative;
      box-shadow: 0 0 40px #ff0000;
      animation: jankyShake 0.7s infinite alternate;
    }
    .crack {
      position: absolute;
      background: #111;
      height: 9px;
      border-radius: 2px;
    }
    .crack1 { top: 22%; left: 12%; width: 68%; transform: rotate(37deg); }
    .crack2 { top: 44%; left: 8%; width: 79%; transform: rotate(-29deg); }
    .crack3 { top: 71%; left: 18%; width: 61%; transform: rotate(41deg); }

    #countdown {
      font-size: 34px;
      font-weight: bold;
      letter-spacing: 5px;
      color: #ff0000;
      text-shadow: 0 0 12px #ff0000;
      margin: 25px 0 35px;
    }
    p {
      font-size: 15px;
      max-width: 620px;
      margin: 0 auto;
    }
    .footer {
      margin-top: 60px;
      font-size: 13px;
      color: #aa0000;
    }
  </style>
</head>
<body>
  <h1>DODO</h1>
  <h2>THE BLACK SWAN</h2>

  <div class="egg">
    <div class="crack crack1"></div>
    <div class="crack crack2"></div>
    <div class="crack crack3"></div>
  </div>

  <h2>HATCHING IN</h2>
  <div id="countdown"></div>

  <p>
    Hatched on /biz/ July 31 2021<br>
    5 years later... the black swan returns to Solana.<br><br>
    Something’s coming.
  </p>

  <div class="footer">
    <a href="https://x.com/BlackSwanDodo_" style="color:#ff6666;">@BlackSwanDodo_</a> 
    • Not financial advice. Just chaos. 🦤
  </div>

  <script>
    function countdown() {
      const target = new Date("2026-07-31T00:00:00Z").getTime();
      const now = new Date().getTime();
      const distance = target - now;

      if (distance < 0) {
        document.getElementById("countdown").innerHTML = "DODO HAS HATCHED 🦤";
        return;
      }

      const days = Math.floor(distance / (1000*60*60*24));
      const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
      const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
      const seconds = Math.floor((distance % (1000*60)) / 1000);

      document.getElementById("countdown").innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }
    setInterval(countdown, 1000);
    countdown();
  </script>

  <style>
    @keyframes jankyShake {
      0% { transform: rotate(-12deg) scale(1.05); }
      100% { transform: rotate(12deg) scale(0.95); }
    }
  </style>
</body>
</html>
